name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python skill harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Capelry scripts
        run: python3 -m py_compile skills/capelry/scripts/capelry.py skills/capelry/scripts/bootstrap.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests
